name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target') && !github.event.pull_request.draft

    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CLA_BOT_APP_ID }}
          private-key: ${{ secrets.CLA_BOT_PRIVATE_KEY }}

      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/azmara-labs/azmara-platform/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: dependabot[bot],azmara-cla-bot[bot]
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, please sign our
            [Contributor License Agreement](https://github.com/azmara-labs/azmara-platform/blob/main/CLA.md).

            You only need to do this once. Comment below with:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-detected-comment: "Thank you for signing our CLA! ✅"
