packages:
  - 'packages/*'
  - 'apps/*'

overrides:
  serialize-javascript: '>=7.0.3'
  shell-quote: '>=1.8.4'
  websocket-driver: '>=0.7.5'
  ws: '>=8.21.0'
  # All bounded to the same major already in the tree - an unbounded
  # '>=x' floor lets pnpm pick any newer major too, which silently pulled
  # in webpack-dev-server 6, http-proxy-middleware 4, and joi 18 (all
  # unverified against Docusaurus/Changesets) the first time this was tried.
  postcss: '>=8.5.10 <9'
  webpack-dev-server: '>=5.2.5 <6'
  launch-editor: '>=2.14.1 <3'
  http-proxy-middleware: '>=2.0.10 <3'
  follow-redirects: '>=1.16.0 <2'
  joi: '>=17.13.4 <18'
  qs: '>=6.15.2 <7'
  esbuild: '>=0.28.1 <0.29.0'
  '@babel/core': '>=7.29.6 <8'
  # js-yaml has two incompatible major lines in the tree: v3 (Changesets'
  # read-yaml-file, still uses the removed safeLoad/safeDump API) and v4
  # (several independent direct requesters: @changesets/parse,
  # @docusaurus/plugin-content-docs, @docusaurus/utils, @11ty/gray-matter).
  # Path-overriding only the gray-matter consumer left the others on the
  # unpatched 4.1.1, so use a global v4 default plus a more-specific path
  # override for the one consumer that actually needs v3 (pnpm gives the
  # more-specific override precedence).
  js-yaml: '>=4.2.0 <5'
  'read-yaml-file>js-yaml': '>=3.15.0 <4'
  # uuid@8 -> >=11.1.1 is the only fix (advisory covers the whole v3-v10
  # range); it's a 3-major jump (v9+ dropped CJS default export for
  # ESM-only). Bounded to <12 since an open floor previously let it drift
  # to 14.x unverified. Only consumer is sockjs, nested under
  # webpack-dev-server (docs dev server, not the production build).
  uuid: '>=11.1.1 <12'

allowBuilds:
  '@biomejs/biome': true
  better-sqlite3: true
  core-js: true
  esbuild: true
  isolated-vm: true
  lefthook: true
  msw: true
  sharp: true

minimumReleaseAgeExclude:
  - postcss@8.5.20
  - '@azmr/pr-quality-checks@0.1.0 || 0.2.0'
